# Stack for local development: Postgres, MongoDB, Jaeger (OpenTelemetry).
# From repository root (folder that contains /src):
#   docker compose --env-file docker/compose.env -f docker/docker-compose.yml up -d
# Or:  .\docker\up.ps1   /   sh docker/up.sh

name: dukaanpro-backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: dukaanpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: dukaanpro-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: dukaanpro-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${OTLP_HTTP_PORT}:4318"
      - "${JAEGER_UI_PORT}:16686"

volumes:
  postgres_data:
  mongo_data:
